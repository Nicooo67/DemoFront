<article
  class="rounded-lg border border-slate-200 bg-white p-5 shadow-sm cursor-pointer"
  [routerLink]="['/notes', note.id]"
>
  <div class="flex items-start justify-between gap-3">
    <h2 class="text-lg font-semibold text-slate-900">{{ note.title }}</h2>
    <span class="rounded-full bg-slate-100 px-2 py-0.5 text-xs text-slate-500">#{{ note.id }}</span>
  </div>
  <p class="mt-2 text-sm leading-relaxed text-slate-700">{{ note.content }}</p>
  <button
    (click)="onDelete($event)"
    class="delete-btn mt-3 text-xs text-red-500 hover:text-red-700"
  >
    Supprimer
  </button>
</article>
